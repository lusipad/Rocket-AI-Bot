name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web-admin/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install admin dependencies
        run: npm --prefix web-admin ci

      - name: Run tests
        run: npm test

      - name: Run type check
        run: npm run lint

      - name: Build backend
        run: npm run build

      - name: Build admin
        run: npm --prefix web-admin run build
